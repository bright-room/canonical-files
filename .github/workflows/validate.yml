name: validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          path: canonical
          persist-credentials: false
      # 検証エンジン(public)。fanout validate の実体は repository-fanout の CLI
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          repository: bright-room/repository-fanout
          path: engine
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: enable pnpm
        run: corepack enable
      - name: install engine deps
        working-directory: engine
        run: pnpm install --frozen-lockfile
      - name: validate canonical tree
        working-directory: engine
        run: pnpm --filter cli run validate -- --dir "${GITHUB_WORKSPACE}/canonical"
